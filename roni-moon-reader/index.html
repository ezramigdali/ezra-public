<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>קסם זמן ירח</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #221a3a;
      --muted: #625a78;
      --paper: #fff9ec;
      --panel: #ffffff;
      --sky: #19244f;
      --sky-2: #5f7bd5;
      --gold: #ffcf4a;
      --mint: #64d2a6;
      --rose: #ff7a8a;
      --blue: #4c8df5;
      --line: rgba(34, 26, 58, 0.15);
      --shadow: 0 18px 50px rgba(15, 18, 55, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans Hebrew", Arial, "Helvetica Neue", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 82% 10%, rgba(255, 207, 74, 0.42), transparent 17rem),
        linear-gradient(145deg, #f6fbff 0%, #fff3d7 43%, #e9f7ef 100%);
    }

    button,
    textarea,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      min-height: 44px;
      border-radius: 8px;
      font-weight: 800;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(280px, 390px) minmax(0, 1fr);
    }

    .side {
      background: linear-gradient(180deg, var(--sky), #26366e 58%, #7462a9);
      color: #fff;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
      overflow: hidden;
    }

    .side::before {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: #ffe58a;
      box-shadow: -22px 12px 0 #26366e;
      top: 28px;
      left: 28px;
      opacity: 0.95;
    }

    .side > * {
      position: relative;
      z-index: 1;
    }

    .brand {
      padding-top: 138px;
    }

    .brand h1 {
      margin: 0;
      font-size: 46px;
      line-height: 1.02;
      letter-spacing: 0;
    }

    .brand p {
      margin: 12px 0 0;
      color: rgba(255, 255, 255, 0.84);
      font-size: 18px;
      line-height: 1.45;
    }

    .progress-box {
      background: rgba(255, 255, 255, 0.13);
      border: 1px solid rgba(255, 255, 255, 0.23);
      border-radius: 8px;
      padding: 16px;
      backdrop-filter: blur(8px);
    }

    .progress-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-weight: 800;
    }

    .meter {
      margin-top: 12px;
      height: 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.22);
      overflow: hidden;
    }

    .meter span {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--mint), var(--gold));
      transition: width 420ms ease;
    }

    .badges {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .badge {
      min-height: 82px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 10px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.72);
      font-size: 14px;
      line-height: 1.25;
    }

    .badge.unlocked {
      color: #221a3a;
      background: #fff3bd;
      border-color: #ffe58a;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
    }

    .side-actions {
      display: grid;
      gap: 10px;
      margin-top: auto;
    }

    .side-actions button {
      color: #fff;
      background: rgba(255, 255, 255, 0.17);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }


    .app.is-locked {
      min-height: 100vh;
      filter: blur(3px);
      pointer-events: none;
      user-select: none;
    }

    .unlock {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(14, 18, 47, 0.72);
      backdrop-filter: blur(12px);
    }

    .unlock[hidden] {
      display: none;
    }

    .unlock-box {
      width: min(420px, 100%);
      border-radius: 8px;
      padding: 24px;
      background: var(--paper);
      border: 1px solid rgba(255, 255, 255, 0.45);
      box-shadow: var(--shadow);
      display: grid;
      gap: 14px;
      text-align: right;
    }

    .unlock-moon {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #fff3bd;
      box-shadow: inset -10px 5px 0 rgba(255, 207, 74, 0.55);
      font-size: 26px;
    }

    .unlock-box h2,
    .unlock-box p {
      margin: 0;
    }

    .unlock-box p {
      color: var(--muted);
      line-height: 1.45;
    }

    .unlock-box label {
      display: grid;
      gap: 7px;
      font-weight: 800;
    }

    .unlock-box input {
      width: 100%;
      min-height: 46px;
      border-radius: 8px;
      border: 1px solid var(--line);
      padding: 0 12px;
      background: #fff;
    }

    .unlock-error {
      min-height: 22px;
      color: #a12b35;
      font-weight: 800;
    }

    .stage {
      padding: 28px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 18px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .page-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      font-weight: 800;
      box-shadow: 0 8px 24px rgba(15, 18, 55, 0.08);
    }

    .tool-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .ghost {
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
      padding: 0 14px;
    }

    .reader {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 290px;
      gap: 18px;
    }

    .page {
      min-height: 520px;
      background: var(--paper);
      border: 1px solid rgba(82, 54, 26, 0.16);
      border-radius: 8px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
    }

    .page-title {
      padding: 22px 24px 0;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .page-title h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .moon-mark {
      flex: 0 0 auto;
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #fff3bd;
      box-shadow: inset -10px 5px 0 rgba(255, 207, 74, 0.55);
      font-size: 24px;
    }

    .text-area {
      padding: 22px 28px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .story-text {
      width: 100%;
      max-width: 800px;
      margin: 0;
      font-size: var(--reader-size, 38px);
      line-height: 2.05;
      font-family: "Noto Sans Hebrew", Arial, "Helvetica Neue", sans-serif;
      font-weight: 700;
      text-align: right;
    }

    .story-text span {
      display: inline-block;
      margin: 0 0 0 0.18em;
      padding: 0.1em 0.08em 0.18em;
      border-radius: 7px;
      unicode-bidi: isolate;
    }

    .story-text span.active-word {
      background: #fff09d;
      box-shadow: 0 0 0 4px #fff09d;
    }

    .story-text span.read-word {
      color: #6b647c;
    }

    .page-actions {
      padding: 18px 22px 22px;
      display: grid;
      grid-template-columns: 1fr 1.8fr 1fr;
      gap: 10px;
      border-top: 1px solid rgba(82, 54, 26, 0.12);
      background: rgba(255, 255, 255, 0.42);
    }

    .primary {
      color: #1d1730;
      background: linear-gradient(180deg, #ffe889, #ffc83c);
      box-shadow: 0 10px 20px rgba(209, 145, 0, 0.22);
      font-size: 18px;
    }

    .secondary {
      color: #fff;
      background: var(--blue);
      padding: 0 14px;
    }

    .panel {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 14px 38px rgba(15, 18, 55, 0.1);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 0;
    }

    .panel h3 {
      margin: 0;
      font-size: 18px;
    }

    .settings {
      display: grid;
      gap: 12px;
    }

    .control {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-weight: 700;
      font-size: 14px;
    }

    .control input[type="range"] {
      width: 100%;
    }

    .switch {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--ink);
      font-weight: 800;
    }

    .switch input {
      width: 22px;
      height: 22px;
      accent-color: var(--blue);
    }

    .mini-list {
      display: grid;
      gap: 8px;
      overflow: auto;
      padding-inline-end: 2px;
    }

    .mini-page {
      min-height: 42px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      text-align: right;
      padding: 9px 10px;
      font-weight: 800;
    }

    .mini-page.done {
      background: #e8fbf2;
      border-color: #aee9cf;
    }

    .mini-page.current {
      outline: 3px solid rgba(76, 141, 245, 0.24);
    }

    .editor {
      position: fixed;
      inset: 0;
      background: rgba(18, 20, 36, 0.62);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 20;
    }

    .editor.open {
      display: flex;
    }

    .editor-box {
      width: min(980px, 100%);
      max-height: min(760px, 92vh);
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.3);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
    }

    .editor-head,
    .editor-foot {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
    }

    .editor-foot {
      border-bottom: 0;
      border-top: 1px solid var(--line);
    }

    .editor-head h2 {
      margin: 0;
      font-size: 20px;
    }

    textarea {
      width: 100%;
      height: 100%;
      min-height: 360px;
      border: 0;
      resize: none;
      padding: 18px;
      direction: rtl;
      line-height: 1.6;
      color: var(--ink);
      outline: none;
    }

    .celebration {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 30;
    }

    .spark {
      position: absolute;
      bottom: 28%;
      right: 50%;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--gold);
      animation: pop 900ms ease-out forwards;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(140%);
      background: #211a38;
      color: #fff;
      padding: 13px 18px;
      border-radius: 8px;
      font-weight: 800;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.24);
      transition: transform 260ms ease;
      z-index: 40;
      text-align: center;
      max-width: calc(100vw - 28px);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    @keyframes pop {
      0% {
        transform: translate(0, 0) scale(0.7);
        opacity: 1;
      }
      100% {
        transform: translate(var(--x), var(--y)) scale(1.4);
        opacity: 0;
      }
    }

    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
      }

      .side {
        min-height: auto;
      }

      .brand {
        padding-top: 90px;
      }

      .brand h1 {
        font-size: 38px;
      }

      .reader {
        grid-template-columns: 1fr;
      }

      .panel {
        order: -1;
      }
    }

    @media (max-width: 620px) {
      .stage {
        padding: 14px;
      }

      .page {
        min-height: 430px;
      }

      .story-text {
        font-size: min(var(--reader-size, 32px), 34px);
        line-height: 2;
      }

      .page-actions {
        grid-template-columns: 1fr;
      }

      .badges {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }
  </style>
</head>
<body>

  <section class="unlock" id="unlockScreen" aria-label="פתיחת הספר">
    <form class="unlock-box" id="unlockForm">
      <div class="unlock-moon" aria-hidden="true">☾</div>
      <h2>הספר נעול</h2>
      <p>הכניסו סיסמה כדי לפתוח את גרסת הספר הפרטית.</p>
      <label>
        סיסמה
        <input id="bookPassword" type="password" autocomplete="current-password" inputmode="text" dir="ltr" required>
      </label>
      <button class="primary" type="submit">פתיחת הספר</button>
      <div class="unlock-error" id="unlockError" role="status" aria-live="polite"></div>
    </form>
  </section>

  <main class="app is-locked" id="appShell" aria-hidden="true">
    <aside class="side">
      <section class="brand" aria-label="שם המשחק">
        <h1>קסם זמן ירח</h1>
        <p>רוני קוראת עמודים קצרים, מסמנת הצלחה, ומתקדמת במסע הירח שלה.</p>
      </section>

      <section class="progress-box" aria-label="התקדמות">
        <div class="progress-top">
          <span id="progressLabel">0 מתוך 6 עמודים</span>
          <span id="starsLabel">0 כוכבים</span>
        </div>
        <div class="meter" aria-hidden="true"><span id="meterFill"></span></div>
      </section>

      <section class="badges" aria-label="פרסים">
        <div class="badge" id="badge1">שער ראשון</div>
        <div class="badge" id="badge2">שלושה עמודים</div>
        <div class="badge" id="badge3">סיום קסום</div>
      </section>

      <div class="side-actions">
        <button type="button" id="editPages">עריכת עמודים</button>
        <button type="button" id="resetProgress">איפוס התקדמות</button>
      </div>
    </aside>

    <section class="stage">
      <header class="toolbar">
        <div class="page-pill" id="pageCounter">עמוד 1</div>
        <div class="tool-buttons">
          <button class="ghost" type="button" id="wordBack" aria-label="מילה קודמת">‹ מילה</button>
          <button class="ghost" type="button" id="wordNext" aria-label="מילה הבאה">מילה ›</button>
        </div>
      </header>

      <section class="reader">
        <article class="page">
          <div class="page-title">
            <h2 id="pageTitle">שער הירח הראשון</h2>
            <div class="moon-mark" aria-hidden="true">☾</div>
          </div>
          <div class="text-area">
            <p class="story-text" id="storyText"></p>
          </div>
          <div class="page-actions">
            <button class="secondary" type="button" id="prevPage">עמוד קודם</button>
            <button class="primary" type="button" id="markRead">קראתי את העמוד</button>
            <button class="secondary" type="button" id="nextPage">עמוד הבא</button>
          </div>
        </article>

        <aside class="panel" aria-label="כלים">
          <h3>מסע הקריאה</h3>
          <div class="settings">
            <label class="control">
              גודל מילים
              <input id="sizeRange" type="range" min="28" max="52" value="38">
            </label>
            <label class="switch">
              <span>הדגשת מילה</span>
              <input id="highlightToggle" type="checkbox" checked>
            </label>
          </div>
          <div class="mini-list" id="pageList"></div>
        </aside>
      </section>
    </section>
  </main>

  <section class="editor" id="editor" aria-modal="true" role="dialog">
    <div class="editor-box">
      <div class="editor-head">
        <h2>עריכת עמודי הקריאה</h2>
        <button class="ghost" type="button" id="closeEditor">סגירה</button>
      </div>
      <textarea id="pagesInput" spellcheck="false"></textarea>
      <div class="editor-foot">
        <button class="ghost" type="button" id="loadDemo">טקסט דמו</button>
        <button class="primary" type="button" id="savePages">שמירה והתחלה</button>
      </div>
    </div>
  </section>

  <div class="celebration" id="celebration"></div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>

    ;

    const els = {
      progressLabel: document.getElementById("progressLabel"),
      starsLabel: document.getElementById("starsLabel"),
      meterFill: document.getElementById("meterFill"),
      pageCounter: document.getElementById("pageCounter"),
      pageTitle: document.getElementById("pageTitle"),
      storyText: document.getElementById("storyText"),
      pageList: document.getElementById("pageList"),
      markRead: document.getElementById("markRead"),
      prevPage: document.getElementById("prevPage"),
      nextPage: document.getElementById("nextPage"),
      wordBack: document.getElementById("wordBack"),
      wordNext: document.getElementById("wordNext"),
      sizeRange: document.getElementById("sizeRange"),
      highlightToggle: document.getElementById("highlightToggle"),
      editPages: document.getElementById("editPages"),
      resetProgress: document.getElementById("resetProgress"),
      appShell: document.getElementById("appShell"),
      unlockScreen: document.getElementById("unlockScreen"),
      unlockForm: document.getElementById("unlockForm"),
      bookPassword: document.getElementById("bookPassword"),
      unlockError: document.getElementById("unlockError"),
      editor: document.getElementById("editor"),
      closeEditor: document.getElementById("closeEditor"),
      savePages: document.getElementById("savePages"),
      loadDemo: document.getElementById("loadDemo"),
      pagesInput: document.getElementById("pagesInput"),
      celebration: document.getElementById("celebration"),
      toast: document.getElementById("toast")
    };

    function normalizePages(raw) {
      return raw
        .split(/\n\s*\n/g)
        .map((chunk, index) => {
          const lines = chunk.split("\n").map(line => line.trim()).filter(Boolean);
          if (!lines.length) return null;
          const hasTitle = lines[0].length < 38 && lines.length > 1;
          return {
            title: hasTitle ? lines[0] : `עמוד ${index + 1}`,
            text: hasTitle ? lines.slice(1).join(" ") : lines.join(" ")
          };
        })
        .filter(page => page && page.text);
    }

    function pagesToText(pages) {
      return pages.map(page => `${page.title}\n${page.text}`).join("\n\n");
    }

    function loadProgress() {
      const saved = localStorage.getItem(storageKey);
      if (!saved) return;
      try {
        const parsed = JSON.parse(saved);
        state.current = Math.min(parsed.current || 0, state.pages.length - 1);
        state.done = new Set(Array.isArray(parsed.done) ? parsed.done : []);
      } catch {
        state.current = 0;
        state.done = new Set();
      }
    }

    function save() {
      localStorage.setItem(storageKey, JSON.stringify({
        current: state.current,
        done: Array.from(state.done)
      }));
    }

    function fromBase64(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function decryptBook(password) {
      const encoder = new TextEncoder();
      const passwordKey = await crypto.subtle.importKey(
        "raw",
        encoder.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      const key = await crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt: fromBase64(encryptedBook.salt),
          iterations: encryptedBook.iterations,
          hash: "SHA-256"
        },
        passwordKey,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
      const decrypted = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: fromBase64(encryptedBook.iv) },
        key,
        fromBase64(encryptedBook.ciphertext)
      );
      const parsed = JSON.parse(new TextDecoder().decode(decrypted));
      if (!Array.isArray(parsed.pages) || !parsed.pages.length) throw new Error("Missing pages");
      return parsed.pages;
    }

    async function unlock(password) {
      els.unlockError.textContent = "פותח...";
      const pages = await decryptBook(password);
      state.pages = pages;
      state.current = 0;
      state.word = 0;
      state.done = new Set();
      loadProgress();
      els.unlockScreen.hidden = true;
      els.appShell.classList.remove("is-locked");
      els.appShell.removeAttribute("aria-hidden");
      els.bookPassword.value = "";
      render();
    }

    function wordsFor(page) {
      return page.text.split(/\s+/).filter(Boolean);
    }

    function renderText() {
      const page = state.pages[state.current];
      const words = wordsFor(page);
      els.storyText.innerHTML = "";
      words.forEach((word, index) => {
        const span = document.createElement("span");
        span.textContent = word;
        if (state.highlight && index === state.word) span.className = "active-word";
        if (state.highlight && index < state.word) span.classList.add("read-word");
        els.storyText.appendChild(span);
        els.storyText.append(" ");
      });
    }

    function renderList() {
      els.pageList.innerHTML = "";
      state.pages.forEach((page, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "mini-page";
        if (state.done.has(index)) button.classList.add("done");
        if (index === state.current) button.classList.add("current");
        button.textContent = `${state.done.has(index) ? "✓ " : ""}${index + 1}. ${page.title}`;
        button.addEventListener("click", () => {
          state.current = index;
          state.word = 0;
          render();
          save();
        });
        els.pageList.appendChild(button);
      });
    }

    function renderProgress() {
      const total = state.pages.length;
      const done = state.done.size;
      const percent = total ? Math.round((done / total) * 100) : 0;
      els.progressLabel.textContent = `${done} מתוך ${total} עמודים`;
      els.starsLabel.textContent = `${done * 3} כוכבים`;
      els.meterFill.style.width = `${percent}%`;
      document.getElementById("badge1").classList.toggle("unlocked", done >= 1);
      document.getElementById("badge2").classList.toggle("unlocked", done >= 3);
      document.getElementById("badge3").classList.toggle("unlocked", done === total && total > 0);
    }

    function render() {
      const page = state.pages[state.current];
      els.pageCounter.textContent = `עמוד ${state.current + 1} מתוך ${state.pages.length}`;
      els.pageTitle.textContent = page.title;
      els.prevPage.disabled = state.current === 0;
      els.nextPage.disabled = state.current === state.pages.length - 1;
      els.markRead.textContent = state.done.has(state.current) ? "העמוד כבר נקרא" : "קראתי את העמוד";
      renderText();
      renderList();
      renderProgress();
    }

    function toast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      window.setTimeout(() => els.toast.classList.remove("show"), 1800);
    }

    function celebrate(finale = false) {
      const colors = ["#ffcf4a", "#64d2a6", "#ff7a8a", "#4c8df5", "#ffffff"];
      for (let i = 0; i < 38; i += 1) {
        const spark = document.createElement("span");
        spark.className = "spark";
        spark.style.background = colors[i % colors.length];
        spark.style.setProperty("--x", `${Math.random() * 520 - 260}px`);
        spark.style.setProperty("--y", `${Math.random() * -360 - 80}px`);
        spark.style.right = `${35 + Math.random() * 30}%`;
        spark.style.animationDelay = `${Math.random() * 120}ms`;
        els.celebration.appendChild(spark);
        window.setTimeout(() => spark.remove(), 1100);
      }
      toast(finale ? "רוני סיימה את מסע הירח!" : "כל הכבוד, עוד שער נפתח!");
    }

    function movePage(delta) {
      state.current = Math.max(0, Math.min(state.pages.length - 1, state.current + delta));
      state.word = 0;
      render();
      save();
    }

    function moveWord(delta) {
      const last = Math.max(0, wordsFor(state.pages[state.current]).length - 1);
      state.word = Math.max(0, Math.min(last, state.word + delta));
      renderText();
    }

    els.markRead.addEventListener("click", () => {
      const wasDone = state.done.has(state.current);
      state.done.add(state.current);
      const isFinale = state.done.size === state.pages.length;
      save();
      render();
      if (!wasDone) celebrate(isFinale);
      if (!isFinale && state.current < state.pages.length - 1) {
        window.setTimeout(() => movePage(1), 850);
      }
    });

    els.prevPage.addEventListener("click", () => movePage(-1));
    els.nextPage.addEventListener("click", () => movePage(1));
    els.wordBack.addEventListener("click", () => moveWord(-1));
    els.wordNext.addEventListener("click", () => moveWord(1));

    els.sizeRange.addEventListener("input", event => {
      document.documentElement.style.setProperty("--reader-size", `${event.target.value}px`);
    });

    els.highlightToggle.addEventListener("change", event => {
      state.highlight = event.target.checked;
      renderText();
    });

    els.editPages.addEventListener("click", () => {
      els.pagesInput.value = pagesToText(state.pages);
      els.editor.classList.add("open");
      els.pagesInput.focus();
    });

    els.closeEditor.addEventListener("click", () => els.editor.classList.remove("open"));

    els.loadDemo.addEventListener("click", () => {
      els.pagesInput.value = pagesToText(demoPages);
    });

    els.savePages.addEventListener("click", () => {
      const pages = normalizePages(els.pagesInput.value);
      if (!pages.length) {
        toast("צריך לפחות עמוד אחד עם טקסט");
        return;
      }
      state.pages = pages;
      state.current = 0;
      state.word = 0;
      state.done = new Set();
      els.editor.classList.remove("open");
      save();
      render();
      toast("העמודים נשמרו. מתחילים!");
    });

    els.resetProgress.addEventListener("click", () => {
      state.done = new Set();
      state.current = 0;
      state.word = 0;
      save();
      render();
      toast("המסע התחיל מחדש");
    });

    window.addEventListener("keydown", event => {
      if (event.key === "ArrowRight") movePage(-1);
      if (event.key === "ArrowLeft") movePage(1);
      if (event.key === " ") {
        event.preventDefault();
        els.markRead.click();
      }
    });

    els.unlockForm.addEventListener("submit", async event => {
      event.preventDefault();
      try {
        await unlock(els.bookPassword.value);
      } catch {
        els.unlockError.textContent = "הסיסמה לא נכונה";
        els.bookPassword.select();
      }
    });

    if (!window.crypto || !window.crypto.subtle) {
      els.unlockError.textContent = "צריך דפדפן מודרני כדי לפתוח את הספר";
      els.bookPassword.disabled = true;
    } else {
      els.bookPassword.focus();
    }
  </script>
</body>
</html>
